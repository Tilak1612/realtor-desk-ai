name: Deploy Supabase Edge Functions

# Vercel only deploys the frontend, so Supabase edge functions (Stripe
# webhook, AI chatbot, email automation, etc.) never auto-deploy. This
# pipeline closes that gap: function code changes on main ship automatically.
# Manual runs are also allowed via the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF not set — skipping deploy."
            echo "Add them in Settings → Secrets and variables → Actions to enable auto-deploy."
            exit 0
          fi
          # Deploys all functions; idempotent. config.toml controls per-function verify_jwt.
          supabase functions deploy --project-ref "$PROJECT_REF"
