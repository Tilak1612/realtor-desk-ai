project_id = "vxkqwkeqincbxrgglmca"

[functions.send-welcome-email]
# Same bug as check-subscription — gateway JWT verification rejects
# publishable-key-scheme tokens with 401 before the function runs.
# Function body does auth.getUser(token) itself (equivalent check).
verify_jwt = false

[functions.calculate-lead-score]
verify_jwt = true

[functions.create-checkout]
# Same gateway-401 pattern as check-subscription. Function body does
# auth.getUser(token) itself; gateway verify was rejecting publishable-
# key-scheme tokens. Disabling gateway verify so clicking Upgrade
# actually reaches the Stripe Checkout call.
verify_jwt = false

[functions.check-subscription]
# verify_jwt = false — function body validates JWT itself via
# supabaseClient.auth.getUser(token). Gateway verify_jwt=true was
# rejecting every POST with 401 (gateway-level, function never ran),
# likely related to the new publishable key scheme. Keeping the
# explicit auth.getUser check means no security regression.
verify_jwt = false

[functions.customer-portal]
# Same pattern as create-checkout — function validates JWT itself.
verify_jwt = false

[functions.claude-chat]
verify_jwt = true

[functions.ai-chatbot]
verify_jwt = true

[functions.email-automation]
verify_jwt = true

[functions.lead-score-calculator]
verify_jwt = true

[functions.apify-runner]
verify_jwt = true

[functions.run-automation]
verify_jwt = true

[functions.send-sms]
