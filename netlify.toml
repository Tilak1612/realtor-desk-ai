# Netlify Configuration for RealtorDesk AI
# This enables proper SEO through prerendering and optimizations

[build]
  command = "npm run build"
  publish = "dist"
  # Environment variables for build
  environment = { NODE_ENV = "production" }

# Enable prerendering for all HTML pages (critical for SEO)
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Prerender routes for better SEO and AI crawler visibility
[[plugins]]
  package = "netlify-plugin-prerender-spa"
  [plugins.inputs]
    # All routes that need prerendering
    routes = [
      "/",
      "/features",
      "/pricing",
      "/canadian-market",
      "/how-it-works",
      "/demo",
      "/resources",
      "/integrations",
      "/faq",
      "/contact",
      "/privacy-policy",
      "/terms-of-service",
      "/signup",
      "/login",
      "/lofty-alternative",
      "/vs/boldtrail",
      "/vs/lofty",
      "/vs/ixact",
      "/vs/wise-agent",
      "/features/ai-powered-crm",
      "/switch-from-boldtrail",
      "/switch-from-lofty",
      "/switch-from-ixact",
      "/switch-from-wise-agent",
      "/blog/ai-transformation",
      "/blog/crea-ddf",
      "/blog/compliance",
      "/blog/lead-conversion",
      "/blog/bilingual-marketing",
      "/blog/success-story",
      "/canada-housing-market-forecast-2025-2026",
      "/canadian-realtors-thrive-slower-market-ai-automation",
      "/lead-response-time-canadian-realtors",
      "/ai-crm-canadian-real-estate-agents-guide",
      "/toronto-vs-vancouver-real-estate-market-2025",
      "/pipeda-compliance-real-estate-ai-tools-canada",
      "/first-time-home-buyer-guide-canada-2025",
      "/sell-home-fast-canada-2025",
      "/edmonton-real-estate-market-2025",
      "/blog/vs-kvcore",
      "/blog/vs-follow-up-boss",
      "/blog/ixact-alternatives",
      "/blog/best-crm-canada-2025",
      "/blog/ai-vs-traditional-crm",
      "/blog/vs-lofty-crm",
      "/blog/boomtown-alternative-canada",
      "/blog/vs-propertybase",
      "/blog/ai-chatbot-real-estate-websites-canada",
      "/resources/voice-ai-real-estate-lead-follow-up-canada",
      "/resources/calgary-real-estate-marketing-strategies",
      "/resources/casl-compliance-real-estate-email-marketing-canada",
      "/resources/cost-of-missed-real-estate-leads-canada"
    ]

# Headers for SEO and security
# Note: Additional headers defined in public/_headers file
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Prerender plugin configuration with longer timeout
[plugins.inputs]
  timeout = 180
  concurrency = 5
  # crawler-specific headers to ensure proper rendering
  renderWith = "puppeteer"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML for dynamic updates
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirects (already handled by _redirects file, but defining here for clarity)
[[redirects]]
  from = "/vs-lofty"
  to = "/lofty-alternative"
  status = 301

[[redirects]]
  from = "/lofty"
  to = "/lofty-alternative"
  status = 301

# Ensure SPA routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
